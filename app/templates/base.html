<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HDD Ontwerp Platform{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/main.css?v=20260320b">
</head>
<body>
  <nav>
    <a href="/orders/" class="nav-brand">HDD Platform</a>
    <div class="nav-links">
      <a href="/orders/" class="nav-link">Orders</a>
      {% if user in ['martien', 'ello', 'test'] %}
      <a href="/admin/" class="nav-link nav-link--admin">Admin</a>
      {% endif %}
    </div>
    <span class="nav-user">{{ user }}</span>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
